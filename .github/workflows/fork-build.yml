name: Fork build (Windows)

# Minimal Windows-only build for the ByteLauncher fork.
# Builds with the BASE tauri.conf.json (no --config), so there is NO code
# signing and NO auto-updater bundle here — that keeps this pipeline free of
# secrets (DigiCert / minisign) so we can prove the toolchain builds first.
# Signing + updater are layered on later in fork-release.yml.

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fork-build.yml'
      - 'apps/app/**'
      - 'apps/app-frontend/**'
      - 'packages/app-lib/**'
      - 'packages/app-macros/**'
      - 'packages/assets/**'
      - 'packages/ui/**'
      - 'packages/utils/**'
      - 'packages/api-client/**'
      - 'packages/daedalus/**'
      - 'fork/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows (unsigned)
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Prepare app-lib environment
        shell: bash
        run: cp packages/app-lib/.env.prod packages/app-lib/.env

      - name: Install dependencies
        run: pnpm install

      - name: Build standalone Windows exe (no installer)
        run: pnpm --filter=@modrinth/app run tauri build --no-bundle

      - name: Collect standalone exe
        shell: bash
        run: |
          mkdir -p dist
          if [ -f "target/release/ByteLauncher.exe" ]; then
            cp "target/release/ByteLauncher.exe" "dist/ByteLauncher.exe"
          elif [ -f "target/release/theseus_gui.exe" ]; then
            cp "target/release/theseus_gui.exe" "dist/ByteLauncher.exe"
          else
            echo "Could not find the built executable in target/release:" >&2
            ls -la target/release/*.exe >&2 || true
            exit 1
          fi

      - name: Build launcher shim
        run: cargo build --release --manifest-path fork/shim/Cargo.toml

      - name: Build installers (online + offline)
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          Copy-Item fork/shim/target/release/shim.exe fork/installer/shim.exe -Force
          Copy-Item apps/app/icons/icon.ico fork/installer/icon.ico -Force
          Copy-Item dist/ByteLauncher.exe fork/installer/ByteLauncher.exe -Force
          & $makensis "/DVERSION=0.0.0-dev" fork/installer/bytelauncher-installer.nsi
          if ($LASTEXITCODE -ne 0) { throw "online installer build failed" }
          & $makensis "/DOFFLINE=1" "/DVERSION=0.0.0-dev" fork/installer/bytelauncher-installer.nsi
          if ($LASTEXITCODE -ne 0) { throw "offline installer build failed" }
          Copy-Item fork/installer/ByteLauncher-Setup.exe dist/ -Force
          Copy-Item fork/installer/ByteLauncher-Setup-Offline.exe dist/ -Force
          Get-ChildItem dist/

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: bytelauncher-installers
          path: |
            dist/ByteLauncher-Setup.exe
            dist/ByteLauncher-Setup-Offline.exe
          if-no-files-found: error

      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: bytelauncher-exe
          path: dist/ByteLauncher.exe
          if-no-files-found: error
