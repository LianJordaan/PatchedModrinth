name: Fork build (Windows)

# Minimal Windows-only build for the PatchedModrinth fork.
# Builds with the BASE tauri.conf.json (no --config), so there is NO code
# signing and NO auto-updater bundle here — that keeps this pipeline free of
# secrets (DigiCert / minisign) so we can prove the toolchain builds first.
# Signing + updater are layered on later in fork-release.yml.

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fork-build.yml'
      - 'apps/app/**'
      - 'apps/app-frontend/**'
      - 'packages/app-lib/**'
      - 'packages/app-macros/**'
      - 'packages/assets/**'
      - 'packages/ui/**'
      - 'packages/utils/**'
      - 'packages/api-client/**'
      - 'packages/daedalus/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows (unsigned)
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Prepare app-lib environment
        shell: bash
        run: cp packages/app-lib/.env.prod packages/app-lib/.env

      - name: Install dependencies
        run: pnpm install

      - name: Build standalone Windows exe (no installer)
        run: pnpm --filter=@modrinth/app run tauri build --no-bundle

      - name: Collect standalone exe
        shell: bash
        run: |
          mkdir -p dist
          if [ -f "target/release/Modrinth App.exe" ]; then
            cp "target/release/Modrinth App.exe" "dist/Modrinth App.exe"
          elif [ -f "target/release/theseus_gui.exe" ]; then
            cp "target/release/theseus_gui.exe" "dist/Modrinth App.exe"
          else
            echo "Could not find the built executable in target/release:" >&2
            ls -la target/release/*.exe >&2 || true
            exit 1
          fi

      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: modrinth-app-exe
          path: dist/Modrinth App.exe
          if-no-files-found: error
